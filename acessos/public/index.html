<script>
    // IMPORTANTE: Substitua o link abaixo pelo SEU link do Render!
    const URL_API = "https://working-with-client-data.onrender.com"; 
    let metodoAtual = "";

    function mudarTela(id) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
    }

    function abrirCadastro(metodo) {
        ["nome", "email", "cpf", "telefone", "endereco", "senha"].forEach(id => document.getElementById(id).value = "");
        metodoAtual = metodo;
        mudarTela('tela-cadastro');
        document.getElementById("tituloCadastro").innerText = "Cadastro via " + metodo;
        
        const btn = document.getElementById("btnFinalizar");
        btn.className = ""; 
        if(metodo === 'Google') btn.classList.add("btn-google");
        else if(metodo === 'Facebook') btn.classList.add("btn-facebook");
        else if(metodo === 'Instagram') btn.classList.add("btn-instagram");
        else btn.classList.add("btn-verde");
    }

    async function finalizarCadastro() {
        const dados = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            cpf: document.getElementById("cpf").value,
            telefone: document.getElementById("telefone").value,
            endereco: document.getElementById("endereco").value,
            senha: document.getElementById("senha").value,
            metodo: metodoAtual
        };

        if(!dados.nome || !dados.email || !dados.senha) return alert("Preencha os campos principais!");

        try {
            const res = await fetch(`${URL_API}/usuario`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(dados)
            });
            if(res.ok) {
                alert("✅ Cadastro realizado!");
                mudarTela('tela-login');
            } else {
                const err = await res.json();
                alert("❌ " + err.erro);
            }
        } catch (e) { alert("Erro de conexão com o servidor"); }
    }

    async function login() {
        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;
        
        try {
            const res = await fetch(`${URL_API}/login-acesso`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email, senha })
            });
            const data = await res.json();
            if(res.ok) {
                document.getElementById("user-nome").innerText = data.usuario;
                document.getElementById("user-prot").innerText = data.protocolo;
                mudarTela('tela-interna');
            } else alert("❌ Email ou senha incorretos");
        } catch (e) { alert("Erro no servidor"); }
    }
</script>
